name: CI - Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'   # netstandard2.1 é compatível com .NET 6+

      - name: Restaurar dependências
        run: |
          dotnet restore IntegracaoVindi/IntegracaoVindi.csproj
          dotnet restore IntegracaoVindi.Tests/IntegracaoVindi.Tests.csproj

      - name: Build
        run: dotnet build IntegracaoVindi/IntegracaoVindi.csproj --no-restore --configuration Release

      - name: Rodar testes
        run: dotnet test IntegracaoVindi.Tests/IntegracaoVindi.Tests.csproj --configuration Release --verbosity normal